<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Gym Grind Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e0e0e; color: white; font-family: Arial, sans-serif; overflow: hidden; touch-action: none; }
canvas { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 0; }
#ui {
  position: fixed; top: 12px; left: 12px; right: 12px; z-index: 100;
  background: rgba(10,10,10,0.92); border: 0.5px solid rgba(255,255,255,0.12);
  padding: 12px 14px; border-radius: 14px;
}
.row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
select, input[type="text"], input[type="number"] {
  background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.2);
  color: white; padding: 7px 10px; border-radius: 8px; font-size: 16px;
  -webkit-appearance: none; appearance: none;
}
select option { background: #1a1a1a; }
input::placeholder { color: rgba(255,255,255,0.3); }
#saveBtn {
  background: #22aa55; border: none; color: white; padding: 7px 16px;
  border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 16px;
}
.stats { display: flex; gap: 10px; flex-wrap: wrap; }
.stat { font-size: 12px; color: rgba(255,255,255,0.55); }
.stat span { color: #7dff9b; font-weight: 600; }
.stat span.red { color: #ff6b6b; }
.stat span.yellow { color: #ffd93d; }
#msg { font-size: 11px; color: #7dff9b; margin-top: 4px; min-height: 13px; }
#syncStatus { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px; }

#dayPopup {
  position: fixed; z-index: 400;
  background: rgba(18,18,18,0.97); border: 0.5px solid rgba(255,255,255,0.18);
  border-radius: 14px; padding: 16px 18px; width: 240px;
  display: none; box-shadow: 0 12px 40px rgba(0,0,0,0.7);
}
#dayPopup h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
#popupStatus { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 14px; }
.popup-btns { display: flex; flex-direction: column; gap: 8px; }
.popup-btns button {
  padding: 10px 14px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; text-align: left;
}
.btn-done  { background: #22aa55; color: white; }
.btn-miss  { background: #cc2222; color: white; }
.btn-reset { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
.btn-close { background: transparent; color: rgba(255,255,255,0.35); font-size: 12px; text-align: center; }

/* Reward setup modal */
#rewardModal {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.75); display: none;
  align-items: center; justify-content: center;
}
#rewardModal.open { display: flex; }
#rewardCard {
  background: #1a1a1a; border: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 24px; width: 300px;
}
#rewardCard h2 { font-size: 18px; margin-bottom: 6px; }
#rewardCard p  { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
#rewardCard input {
  width: 100%; margin-bottom: 10px; background: rgba(255,255,255,0.08);
  border: 0.5px solid rgba(255,255,255,0.2); color: white;
  padding: 10px 12px; border-radius: 8px; font-size: 16px;
}
#rewardCard input::placeholder { color: rgba(255,255,255,0.3); }
#rewardCard .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
#rewardCard button {
  flex: 1; padding: 10px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
#btnSaveReward { background: #22aa55; color: white; }
#btnCancelReward { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }

#modeTag {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: rgba(255,255,255,0.25); pointer-events: none; z-index: 100;
  white-space: nowrap; transition: color 0.3s;
}
</style>
</head>
<body>

<div id="ui">
  <div class="row">
    <select id="monthSel"></select>
    <select id="yearSel"></select>
    <button id="rewardBtn" style="background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.2);color:white;padding:7px 12px;border-radius:8px;font-size:14px;cursor:pointer;flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">🎯 Recompensa</button>
    <button id="saveBtn" style="display:none">Guardar</button>
  </div>
  <div class="stats">
    <div class="stat">🎯 <span id="sReward">—</span></div>
    <div class="stat">💰 $<span id="sPerGym">0</span>/día</div>
    <div class="stat">✅ <span id="sDone">0</span> gym</div>
    <div class="stat">❌ <span id="sFail">0</span> fallas</div>
    <div class="stat">🏆 $<span id="sEarned">0</span></div>
    <div class="stat" id="penaltyInfo" style="display:none">⚠️ <span id="sPenalty" class="yellow"></span></div>
  </div>
  <div id="msg"></div>
  <div id="syncStatus">⏳ Conectando…</div>
</div>

<!-- Day popup -->
<div id="dayPopup">
  <h3 id="popupTitle">Día</h3>
  <div id="popupStatus"></div>
  <div class="popup-btns">
    <button class="btn-done"  id="btnDone">✅ Gym hecho</button>
    <button class="btn-miss"  id="btnMiss">❌ Marcar falla</button>
    <button class="btn-reset" id="btnReset">⬜ Quitar marca</button>
    <button class="btn-close" id="btnClose">Cerrar</button>
  </div>
</div>

<!-- Reward modal -->
<div id="rewardModal">
  <div id="rewardCard">
    <h2>Nueva recompensa</h2>
    <p>Si no la cumplís en 30 días, se penaliza un 25%.<br>Los fines de semana cuentan 3×.</p>
    <input id="modalRewardName" type="text" placeholder="¿Qué querés ganar?">
    <input id="modalRewardCost" type="number" placeholder="Valor en $">
    <div class="modal-btns">
      <button id="btnSaveReward">Guardar</button>
      <button id="btnCancelReward">Cancelar</button>
    </div>
  </div>
</div>

<div id="modeTag">✋ Paneo · Mantén 2° tap = órbita · 2 dedos = zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ── Supabase client (inline, no bundler needed) ─── */
const SUPA_URL = "https://wetwdokwnstjidoceoib.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndldHdkb2t3bnN0amlkb2Nlb2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NTAyNDQsImV4cCI6MjA5NTIyNjI0NH0.PMC2z6gXGE_wnyo7esdP_F-Vp-N0RZbHKPa9am6CQE0";

const supa = {
  async rpc(fn, params={}) {
    const res = await fetch(`${SUPA_URL}/rest/v1/rpc/${fn}`, {
      method: "POST",
      headers: {
        "apikey": SUPA_KEY,
        "Authorization": "Bearer " + SUPA_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(params)
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async from(table) {
    return {
      _table: table,
      async insert(row) {
        const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
          method: "POST",
          headers: {
            "apikey": SUPA_KEY,
            "Authorization": "Bearer " + SUPA_KEY,
            "Content-Type": "application/json",
            "Prefer": "return=representation"
          },
          body: JSON.stringify(row)
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      }
    };
  }
};

/* ── App state ───────────────────────────────────── */
const MONTHS  = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
  "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_ES = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const today   = new Date();
let curMonth  = today.getMonth();   // 0-indexed
let curYear   = today.getFullYear();

// In-memory cache for current month — avoids re-fetching on every buildGrid
let monthCache = { days: {}, reward: null, value_per_day: 0 };

function daysInMonth(y,m) { return new Date(y, m+1, 0).getDate(); }
function setSyncStatus(txt) { document.getElementById("syncStatus").textContent = txt; }
function showMsg(txt) {
  document.getElementById("msg").textContent = txt;
  setTimeout(() => document.getElementById("msg").textContent = "", 2500);
}

/* ── Supabase data layer ─────────────────────────── */
async function loadMonth(y, m) {
  setSyncStatus("⏳ Cargando…");
  try {
    // 1. Run autofail for past days (idempotent)
    await supa.rpc("gym_autofail_past_days");
    // 2. Check penalty
    await supa.rpc("gym_check_penalty");
    // 3. Load month data in one round-trip
    const data = await supa.rpc("gym_load_month", { p_year: y, p_month: m + 1 }); // DB uses 1-indexed months
    monthCache = {
      days:          data.days          || {},
      reward:        data.reward        || null,
      value_per_day: data.value_per_day || 0
    };
    setSyncStatus("✅ Sincronizado");
  } catch(e) {
    setSyncStatus("❌ Sin conexión — " + e.message);
    console.error(e);
  }
}

async function setDay(y, m, d, state) {
  setSyncStatus("⏳ Guardando…");
  try {
    await supa.rpc("gym_set_day", {
      p_year:  y,
      p_month: m + 1,  // DB uses 1-indexed
      p_day:   d,
      p_state: state   // null = delete
    });
    // Update local cache immediately
    if (state === null) delete monthCache.days[String(d)];
    else monthCache.days[String(d)] = state === "done" && isWeekend(y, m, d) ? "weekend_bonus" : state;
    // Reload to get updated current_amount
    await loadMonth(y, m);
    setSyncStatus("✅ Guardado");
  } catch(e) {
    setSyncStatus("❌ Error — " + e.message);
    console.error(e);
  }
}

function isWeekend(y, m, d) {
  const dow = new Date(y, m, d).getDay();
  return dow === 0 || dow === 6;
}

function getDayState(d) {
  return monthCache.days[String(d)] || undefined;
}

/* ── UI selectors ────────────────────────────────── */
const monthSel = document.getElementById("monthSel");
const yearSel  = document.getElementById("yearSel");
MONTHS.forEach((m,i) => {
  const o = document.createElement("option"); o.value=i; o.textContent=m; monthSel.appendChild(o);
});
monthSel.value = curMonth;
for (let y=2024; y<=2030; y++) {
  const o = document.createElement("option"); o.value=y; o.textContent=y; yearSel.appendChild(o);
}
yearSel.value = curYear;

function updateUI() {
  const r    = monthCache.reward;
  const days = daysInMonth(curYear, curMonth);
  let done=0, miss=0, weekendBonus=0;
  for (let d=1; d<=days; d++) {
    const s = getDayState(d);
    if (s==="done" || s==="weekend_bonus") done++;
    if (s==="miss") miss++;
    if (s==="weekend_bonus") weekendBonus++;
  }

  document.getElementById("sReward").textContent = r ? r.name : "Sin recompensa";
  document.getElementById("sPerGym").textContent = monthCache.value_per_day
    ? Math.round(monthCache.value_per_day) : 0;
  document.getElementById("sDone").textContent   = done + (weekendBonus ? ` (${weekendBonus}×3 fin de semana)` : "");
  document.getElementById("sFail").textContent   = miss;
  document.getElementById("sEarned").textContent = r ? Math.round(r.current_amount) : 0;

  // Reward button label
  const rewardBtn = document.getElementById("rewardBtn");
  if(r){
    const pct = r.target_amount>0 ? Math.round(r.current_amount/r.target_amount*100) : 0;
    rewardBtn.textContent = `🎯 ${r.name} (${pct}%)`;
  } else {
    rewardBtn.textContent = "🎯 Nueva recompensa";
  }

  // Penalty / deadline warning
  document.getElementById("penaltyInfo").style.display="none";
  if(r && r.penalized){
    document.getElementById("penaltyInfo").style.display="";
    document.getElementById("sPenalty").textContent="⚠️ Penalizado 25%";
  } else if(r && r.deadline_at){
    const daysLeft=Math.ceil((new Date(r.deadline_at)-new Date())/86400000);
    if(daysLeft<=7&&daysLeft>0){
      document.getElementById("penaltyInfo").style.display="";
      document.getElementById("sPenalty").textContent=`⏰ ${daysLeft}d para penalización`;
    }
  }
}

/* ── Three.js ────────────────────────────────────── */
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0e0e0e);
scene.fog = new THREE.Fog(0x0e0e0e, 40, 75);
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const dir = new THREE.DirectionalLight(0xffffff, 1.1);
dir.position.set(6, 14, 8); scene.add(dir);
const fillL = new THREE.PointLight(0x3355ff, 0.3, 60);
fillL.position.set(-12, 4, -12); scene.add(fillL);

/* ── Camera ──────────────────────────────────────── */
const target = new THREE.Vector3(0,0,0);
let camTheta=0.4, camPhi=0.72, camRadius=28;
const PAN_LIMIT = 14;
let gridCentroid = new THREE.Vector3(0,0,0);
let targetInitialized = false;

function clampTarget() {
  target.x = Math.max(gridCentroid.x-PAN_LIMIT, Math.min(gridCentroid.x+PAN_LIMIT, target.x));
  target.z = Math.max(gridCentroid.z-PAN_LIMIT, Math.min(gridCentroid.z+PAN_LIMIT, target.z));
}
function applyCam() {
  const sT=Math.sin(camTheta), cT=Math.cos(camTheta);
  const sP=Math.sin(camPhi),   cP=Math.cos(camPhi);
  camera.position.set(target.x+camRadius*sT*sP, target.y+camRadius*cP, target.z+camRadius*cT*sP);
  camera.lookAt(target);
}
applyCam();

function doPan(dx, dy) {
  const right = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 0);
  right.y=0; right.normalize();
  const upXZ = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 1);
  upXZ.y=0; upXZ.normalize();
  const scale = camRadius * 0.001;
  target.addScaledVector(right, -dx*scale);
  target.addScaledVector(upXZ, dy*scale);
  clampTarget(); applyCam();
}
function doOrbit(dx, dy) {
  camTheta -= dx*0.006;
  camPhi = Math.max(0.12, Math.min(1.35, camPhi - dy*0.006));
  applyCam();
}

/* ── Grid ────────────────────────────────────────── */
const GAP=2.0, SIZE=1.35;
let cubes=[], labelObjs=[], edgesHelper=null;
const edgesMat = new THREE.LineBasicMaterial({ color: 0xff00cc, linewidth: 2 });

function clearEdges() { if (edgesHelper) { scene.remove(edgesHelper); edgesHelper=null; } }
function highlightCube(cube) {
  clearEdges(); if (!cube) return;
  edgesHelper = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(SIZE*1.02, SIZE*1.02, SIZE*1.02)),
    edgesMat
  );
  edgesHelper.position.copy(cube.position);
  scene.add(edgesHelper);
}

function makeLabel(text, opts={}) {
  const cv=document.createElement("canvas"); cv.width=256; cv.height=128;
  const ctx=cv.getContext("2d");
  ctx.fillStyle=opts.color||"rgba(255,255,255,0.75)";
  ctx.font=(opts.bold?"bold ":"")+(opts.size||32)+"px Arial";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(text,128,64);
  const mat=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthWrite:false});
  const sp=new THREE.Sprite(mat);
  sp.scale.set(opts.sw||2.2, opts.sh||1.1, 1);
  return sp;
}

// Hit meshes declared before buildGrid
let hitMeshes=[];
function rebuildHitMeshes() {
  hitMeshes.forEach(m=>scene.remove(m)); hitMeshes=[];
  const hitGeo=new THREE.BoxGeometry(SIZE*0.72, SIZE*0.72*2, SIZE*0.72);
  for (const cube of cubes) {
    const m=new THREE.Mesh(hitGeo, new THREE.MeshBasicMaterial({visible:false}));
    m.position.copy(cube.position);
    m.userData=cube.userData;
    scene.add(m); hitMeshes.push(m);
  }
}

function buildGrid() {
  cubes.forEach(c=>scene.remove(c));
  labelObjs.forEach(s=>scene.remove(s));
  clearEdges(); cubes=[]; labelObjs=[];

  const total    = daysInMonth(curYear, curMonth);
  const todayD   = (curMonth===today.getMonth()&&curYear===today.getFullYear()) ? today.getDate() : -1;
  const firstDow = new Date(curYear, curMonth, 1).getDay();
  const weeks    = Math.ceil((total+firstDow)/7);
  const offX     = -(6*GAP)/2;
  const offZ     = -(weeks-1)*GAP/2;

  gridCentroid.set(offX+3*GAP, 0, offZ+(weeks-1)*GAP/2);
  if (!targetInitialized) {
    target.copy(gridCentroid); target.y=0;
    targetInitialized=true; applyCam();
  }

  // Day-of-week headers
  DAYS_ES.forEach((name,i) => {
    const sp=makeLabel(name,{size:65,color:"rgba(255,255,255,0.8)",bold:true,sw:3.2,sh:1.5});
    sp.position.set(offX+i*GAP,1.9,offZ-GAP*1.3);
    scene.add(sp); labelObjs.push(sp);
  });
  // Week labels
  for (let w=0;w<weeks;w++) {
    const sp=makeLabel("S"+(w+1),{size:51,color:"rgba(255,255,255,0.5)",sw:2.2,sh:1.1});
    sp.position.set(offX-GAP*1.5,1.4,offZ+w*GAP);
    scene.add(sp); labelObjs.push(sp);
  }

  for (let d=1; d<=total; d++) {
    const dow  = (firstDow+d-1)%7;
    const week = Math.floor((firstDow+d-1)/7);
    const wknd = dow===0||dow===6;

    const isPastDay = (curYear<today.getFullYear()) ||
      (curYear===today.getFullYear()&&curMonth<today.getMonth()) ||
      (curYear===today.getFullYear()&&curMonth===today.getMonth()&&d<todayD);
    const isToday = d===todayD;

    const state          = getDayState(d);
    const isDone         = state==="done"||state==="weekend_bonus";
    const isWeekendBonus = state==="weekend_bonus";
    const isMiss         = state==="miss";
    const isAutofail     = isPastDay && !isDone && !isMiss && !wknd;

    let color;
    if      (isWeekendBonus) color=0x1166ff;  // blue = weekend 3x
    else if (isDone)         color=0x22aa55;  // green
    else if (isMiss)         color=0xbb2222;  // red manual
    else if (isAutofail)     color=0xbb2222;  // red auto
    else if (isToday)        color=0xffaa22;  // orange
    else if (wknd)           color=0x1a1a2e;  // dark blue = weekend future
    else                     color=0x2a2a2a;  // grey future

    const geo  = new THREE.BoxGeometry(SIZE,SIZE,SIZE);
    const mat  = new THREE.MeshPhongMaterial({color, shininess:isDone?90:22});
    const cube = new THREE.Mesh(geo,mat);
    cube.position.set(offX+dow*GAP, 0, offZ+week*GAP);
    cube.userData={day:d,dow,week,state,isPastDay,isToday,isDone,isMiss,isAutofail,wknd,isWeekendBonus};
    scene.add(cube); cubes.push(cube);

    const numSp=makeLabel(String(d),{size:28,color:"rgba(255,255,255,0.8)",sw:0.9,sh:0.55});
    numSp.position.set(cube.position.x,SIZE*0.5+0.28,cube.position.z);
    scene.add(numSp); labelObjs.push(numSp);
  }

  rebuildHitMeshes();
  updateUI();
}

/* ── Raycaster ───────────────────────────────────── */
const rc=new THREE.Raycaster();
const mv=new THREE.Vector2();

function doTap(x, y) {
  const rect=renderer.domElement.getBoundingClientRect();
  mv.x=((x-rect.left)/rect.width)*2-1;
  mv.y=-((y-rect.top)/rect.height)*2+1;
  rc.setFromCamera(mv,camera);
  const hits=rc.intersectObjects(hitMeshes);
  if (hits.length>0) {
    const day=hits[0].object.userData.day;
    const cube=cubes.find(c=>c.userData.day===day);
    if (cube) openPopup(cube,x,y);
  } else {
    if (dayPopup.style.display==="block") closePopup();
  }
}

/* ── Popup ───────────────────────────────────────── */
const dayPopup=document.getElementById("dayPopup");
dayPopup._day=null;

function positionPopup(sx,sy) {
  const W=window.innerWidth,H=window.innerHeight,PW=248,PH=230;
  let px=sx+18,py=sy-20;
  if(px+PW>W-8)px=sx-PW-10;if(px<8)px=8;
  if(py+PH>H-8)py=H-PH-8; if(py<8)py=8;
  dayPopup.style.left=px+"px"; dayPopup.style.top=py+"px";
}

function openPopup(cube,sx,sy) {
  highlightCube(cube);
  const d=cube.userData;
  dayPopup._day=d.day;

  document.getElementById("popupTitle").textContent=DAYS_ES[d.dow]+" "+d.day+" de "+MONTHS[curMonth];

  let st="";
  if      (d.isWeekendBonus) st="💙 Fin de semana 3×";
  else if (d.isDone)         st="✅ Gym hecho";
  else if (d.isMiss)         st="❌ Marcado como falla";
  else if (d.isAutofail)     st="🔴 Día pasado sin registrar";
  else if (d.isToday)        st="🟡 Hoy";
  else if (d.wknd)           st="🏖 Fin de semana (3× si vas)";
  else                       st="⬜ Día futuro";
  document.getElementById("popupStatus").textContent=st;

  const canEdit=!d.isAutofail;
  document.getElementById("btnDone").style.display  =canEdit?"block":"none";
  document.getElementById("btnMiss").style.display  =(canEdit&&!d.wknd)?"block":"none";
  document.getElementById("btnReset").style.display =(canEdit&&d.state)?"block":"none";

  positionPopup(sx,sy);
  dayPopup.style.display="block";
}

function closePopup() {
  dayPopup.style.display="none"; dayPopup._day=null; clearEdges();
}

async function applyState(state) {
  const day=dayPopup._day;
  if(day===null) return;
  closePopup();
  await setDay(curYear,curMonth,day,state);
  buildGrid();
}

function bindBtn(id,fn) {
  const el=document.getElementById(id);
  el.addEventListener("touchstart",e=>{e.stopPropagation();e.preventDefault();fn();},{passive:false});
  el.addEventListener("click",e=>{e.stopPropagation();fn();});
}
bindBtn("btnDone",  ()=>applyState("done"));
bindBtn("btnMiss",  ()=>applyState("miss"));
bindBtn("btnReset", ()=>applyState(null));
bindBtn("btnClose", closePopup);

/* ── Reward modal ────────────────────────────────── */
const rewardModal=document.getElementById("rewardModal");

document.getElementById("rewardBtn").addEventListener("click",()=>{
  const r=monthCache.reward;
  const card=document.getElementById("rewardCard");
  if(r){
    card.querySelector("h2").textContent="Nueva recompensa";
    card.querySelector("p").textContent=
      `"${r.name}" está activa ($${Math.round(r.current_amount)} de $${Math.round(r.target_amount)}). Al guardar una nueva, la actual se cierra.`;
    document.getElementById("modalRewardName").value="";
    document.getElementById("modalRewardCost").value="";
  } else {
    card.querySelector("h2").textContent="Nueva recompensa";
    card.querySelector("p").textContent="Si no la cumplís en 30 días, se penaliza un 25%.
Los fines de semana cuentan 3×.";
    document.getElementById("modalRewardName").value="";
    document.getElementById("modalRewardCost").value="";
  }
  rewardModal.classList.add("open");
});

document.getElementById("btnCancelReward").addEventListener("click",()=>rewardModal.classList.remove("open"));

document.getElementById("btnSaveReward").addEventListener("click",async()=>{
  const name=document.getElementById("modalRewardName").value.trim();
  const cost=Number(document.getElementById("modalRewardCost").value||0);
  if(!name||!cost){showMsg("Completá nombre y valor");return;}

  const hasActive = monthCache.reward !== null;
  // If there's an active reward, confirm completion before starting new one
  if(hasActive){
    const r = monthCache.reward;
    const pct = r.target_amount > 0
      ? Math.round(r.current_amount / r.target_amount * 100) : 0;
    const ok = confirm(
      `¿Completaste "${r.name}"?

Acumulado: $${Math.round(r.current_amount)} de $${Math.round(r.target_amount)} (${pct}%)

Al confirmar se cierra esa recompensa y arranca la nueva.`
    );
    if(!ok){return;}
  }

  rewardModal.classList.remove("open");
  setSyncStatus("⏳ Guardando recompensa…");
  try {
    if(hasActive){
      // Complete current + start new in one atomic RPC
      await supa.rpc("gym_complete_reward", {p_name: name, p_amount: cost});
    } else {
      // No active reward — just insert
      const db=await supa.from("gym_reward");
      await db.insert({name, target_amount:cost});
    }
    await loadMonth(curYear,curMonth);
    buildGrid();
    showMsg("✓ Recompensa guardada");
  } catch(e) {
    setSyncStatus("❌ "+e.message);
  }
});

monthSel.onchange=()=>{curMonth=Number(monthSel.value);targetInitialized=false;init();};
yearSel.onchange =()=>{curYear=Number(yearSel.value); targetInitialized=false;init();};

/* ── Mode ────────────────────────────────────────── */
const modeTag=document.getElementById("modeTag");
function showMode(o){
  modeTag.textContent=o?"🔄 Órbita activa":"✋ Paneo";
  modeTag.style.color=o?"rgba(255,220,80,0.85)":"rgba(255,255,255,0.25)";
}

/* ── Touch (voxel 4D pattern) ────────────────────── */
let isDragging=false,isPinching=false;
let lastX=0,lastY=0,downX=0,downY=0,downTime=0,lastPinchDist=0;
let orbitHeld=false,lastTapTime=0,lastTapX=0,lastTapY=0;

renderer.domElement.addEventListener("touchstart",e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const t=e.touches[0];
    isDragging=true;isPinching=false;
    lastX=t.clientX;lastY=t.clientY;downX=t.clientX;downY=t.clientY;downTime=Date.now();
    const dt=downTime-lastTapTime,dd=Math.hypot(downX-lastTapX,downY-lastTapY);
    orbitHeld=(dt<280&&dd<45); if(orbitHeld)showMode(true);
  } else if(e.touches.length===2){
    isDragging=false;isPinching=true;
    lastPinchDist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
  }
},{passive:false});

renderer.domElement.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    const t=e.touches[0],dx=t.clientX-lastX,dy=t.clientY-lastY;
    if(orbitHeld)doOrbit(dx,dy);else doPan(dx,dy);
    lastX=t.clientX;lastY=t.clientY;
  } else if(e.touches.length===2&&isPinching){
    const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    camRadius=Math.max(8,Math.min(55,camRadius*(lastPinchDist/d)));
    lastPinchDist=d;applyCam();
  }
},{passive:false});

renderer.domElement.addEventListener("touchend",e=>{
  if(orbitHeld&&e.touches.length===0){orbitHeld=false;showMode(false);}
  if(isDragging&&e.touches.length===0){
    const moved=Math.abs(downX-lastX)>8||Math.abs(downY-lastY)>8;
    if(!moved&&Date.now()-downTime<350){
      doTap(downX,downY);
      lastTapTime=Date.now();lastTapX=downX;lastTapY=downY;
    }
  }
  if(e.touches.length===0){isDragging=false;isPinching=false;}
  else if(e.touches.length===1){isPinching=false;isDragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
},{passive:false});

/* ── Mouse ───────────────────────────────────────── */
let mDown=false,mPrevX=0,mPrevY=0,mDownX=0,mDownY=0,mDownTime=0;
renderer.domElement.addEventListener("mousedown",e=>{mDown=true;mPrevX=e.clientX;mPrevY=e.clientY;mDownX=e.clientX;mDownY=e.clientY;mDownTime=Date.now();});
window.addEventListener("mouseup",e=>{
  if(mDown){const moved=Math.abs(e.clientX-mDownX)>4||Math.abs(e.clientY-mDownY)>4;if(!moved&&Date.now()-mDownTime<400)doTap(e.clientX,e.clientY);}
  mDown=false;
});
window.addEventListener("mousemove",e=>{
  if(!mDown)return;
  const dx=e.clientX-mPrevX,dy=e.clientY-mPrevY;
  if(e.buttons===2||e.altKey)doOrbit(dx,dy);else doPan(dx,dy);
  mPrevX=e.clientX;mPrevY=e.clientY;
});
renderer.domElement.addEventListener("contextmenu",e=>e.preventDefault());
renderer.domElement.addEventListener("wheel",e=>{
  e.preventDefault();
  camRadius=Math.max(8,Math.min(55,camRadius*(e.deltaY>0?1.08:0.93)));
  applyCam();
},{passive:false});

/* ── Render loop ─────────────────────────────────── */
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}
animate();

window.addEventListener("resize",()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

/* ── Boot ────────────────────────────────────────── */
async function init() {
  await loadMonth(curYear, curMonth);
  buildGrid();
}
init();
</script>
