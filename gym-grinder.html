<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e0e0e; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; overflow: hidden; touch-action: none; }
canvas { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 0; }

#ui {
  position: fixed; top: 12px; left: 12px; right: 12px; z-index: 100;
  background: rgba(10,10,10,0.94); border: 0.5px solid rgba(255,255,255,0.12);
  padding: 12px 14px; border-radius: 14px;
}
.row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
select, input[type="text"], input[type="number"] {
  background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.2);

input::placeholder { color: rgba(255,255,255,0.3); }

.stats { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

.stat { font-size: 12px; color: rgba(255,255,255,0.55); white-space: nowrap; }
.stat span        { color: #7dff9b; font-weight: 600; }
.stat span.red    { color: #ff6b6b; }
.stat span.yellow { color: #ffd93d; }
.stat span.orange { color: #ffaa22; }
.stat span.fire   { color: #ff6b22; }
.stat.clickable   { cursor: pointer; user-select: none; }
.stat.clickable:hover { color: rgba(255,255,255,0.85); }
.stat.clickable:hover span { filter: brightness(1.15); }

#rewardProgress {
  margin-top: 8px;
  background: rgba(255,255,255,0.06);

}
#rewardProgressBar {

<script>
/* ── Supabase client — SIN AbortController para evitar DataCloneError ── */
const SUPA_URL = "https://wetwdokwnstjidoceoib.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndldHdkb2t3bnN0amlkb2Nlb2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NTAyNDQsImV4cCI6MjA5NTIyNjI0NH0.PMC2z6gXGE_wnyo7esdP_F-Vp-N0RZbHKPa9am6CQE0";

/* Timeout via Promise.race — evita pasar AbortSignal al fetch */
function fetchWithTimeout(url, opts, ms=10000) {
  return Promise.race([
    fetch(url, opts),
    new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), ms))
  ]);
}

const supa = {
  async rpc(fn, params={}) {
    try {
      const res = await fetchWithTimeout(`${SUPA_URL}/rest/v1/rpc/${fn}`, {
        method: "POST",
        headers: {
          "apikey": SUPA_KEY,
          "Authorization": "Bearer " + SUPA_KEY,
          "Content-Type": "application/json",
          "Content-Profile": "public"
        },
        body: JSON.stringify(params)
      });
      const text = await res.text();
      if (!res.ok) throw new Error(`${fn}: ${text}`);
      return text ? JSON.parse(text) : null;
    } catch(e) {
      throw e;
    }
  },
  async insert(table, row) {
    const res = await fetchWithTimeout(`${SUPA_URL}/rest/v1/${table}`, {
      method: "POST",
      headers: {
        "apikey": SUPA_KEY,
        "Authorization": "Bearer " + SUPA_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify(row)
    });
    const text = await res.text();
    if (!res.ok) throw new Error(`insert ${table}: ${text}`);
    return text ? JSON.parse(text) : null;
  }
};

/* ── Constants ─────────────────────────────────── */
const MUSCLES = [
  { id:"pecho",         label:"Pecho",   icon:"💪" },
  { id:"espalda",       label:"Espalda", icon:"🔙" },
  { id:"piernas_front", label:"Cuad",    icon:"🦵" },
  { id:"piernas_back",  label:"Isquio",  icon:"🦿" },
  { id:"hombros",       label:"Hombros", icon:"🏋" },
  { id:"core",          label:"Core",    icon:"🎯" },
  { id:"cardio",        label:"Cardio",  icon:"🏃" },
];

const MUSCLE_COLORS = {
  pecho:         { cube: 0xe8553d, css: "#e8553d" },
  espalda:       { cube: 0x3d88e8, css: "#3d88e8" },
  piernas_front: { cube: 0x3de87a, css: "#3de87a" },
  piernas_back:  { cube: 0x3dd8e8, css: "#3dd8e8" },
  hombros:       { cube: 0x9b3de8, css: "#9b3de8" },
  core:          { cube: 0xe8c23d, css: "#e8c23d" },
  cardio:        { cube: 0xe83d9b, css: "#e83d9b" },
};

const MONTHS  = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
                 "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_ES = ["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
const today   = new Date();
let curMonth  = today.getMonth();
let curYear   = today.getFullYear();

let monthCache = { days: {}, photo_counts: {}, reward: null, value_per_day: 0 };

const WEEK_GOALS = [2, 3, 4, 5, 6];
let weeklyGoal = parseInt(localStorage.getItem("gymWeeklyGoal") || "4");
if (!WEEK_GOALS.includes(weeklyGoal)) weeklyGoal = 4;

function dbg(msg) { console.log("[GG]", msg); }

/* ── Helpers ──────────────────────────────────── */
function daysInMonth(y,m)  { return new Date(y,m+1,0).getDate(); }
function isWeekend(y,m,d)  { const dw=new Date(y,m,d).getDay(); return dw===0||dw===6; }
function getDayState(d)    { const v=monthCache.days[String(d)]; if(!v) return undefined; return typeof v==="string"?v:v.state; }
function getDayMuscle(d)   { const v=monthCache.days[String(d)]; if(!v||typeof v==="string") return null; return v.muscle_group||null; }

function setSyncStatus(txt) {
  const el = document.getElementById("syncStatus");
  el.textContent = txt;
  el.style.color = txt.startsWith("❌") ? "#ff6b6b"
                 : txt.startsWith("✅") ? "#7dff9b"
                 : "rgba(255,255,255,0.3)";
}

let _msgTimer = null;
function showMsg(txt, color="#7dff9b") {
  const el = document.getElementById("msg");
  el.textContent = txt; el.style.color = color;
  clearTimeout(_msgTimer);
  _msgTimer = setTimeout(() => { el.textContent = ""; }, 3200);
}

/* ── Analytics ────────────────────────────────── */
function calcStreak() {
  if (curMonth!==today.getMonth() || curYear!==today.getFullYear()) return 0;
  const todayD = today.getDate();
  let streak = 0;
  for (let d = todayD; d >= 1; d--) {
    const dw   = new Date(curYear,curMonth,d).getDay();
    const wknd = (dw===0||dw===6);
    const s    = getDayState(d);
    if (s==="done" || s==="weekend_bonus") { streak++; continue; }
    if (wknd) continue;
    if (d===todayD && !s) continue;
    break;
  }
  return streak;
}

function calcCompletion() {
  const todayD = (curMonth===today.getMonth() && curYear===today.getFullYear())
    ? today.getDate() : daysInMonth(curYear,curMonth);
  let weekdays=0, done=0;
  for (let d=1; d<=todayD; d++) {
    const dw = new Date(curYear,curMonth,d).getDay();
    if (dw===0||dw===6) continue;
    weekdays++;
    const s = getDayState(d);
    if (s==="done" || s==="weekend_bonus") done++;
  }
  return weekdays>0 ? Math.round(done/weekdays*100) : 0;
}

function calcWeekDone() {
  if (curMonth!==today.getMonth() || curYear!==today.getFullYear()) return 0;
  const todayD = today.getDate();
  const dw = today.getDay();
  const mondayOff = (dw===0) ? -6 : 1-dw;
  const weekStart = todayD + mondayOff;
  let done = 0;
  for (let d=Math.max(1,weekStart); d<=todayD; d++) {
    const s = getDayState(d); if(s==="done"||s==="weekend_bonus") done++;
  }
  return done;
}

function calcMuscleStats() {
  const counts = {};
  MUSCLES.forEach(m => counts[m.id]=0);
  const total = daysInMonth(curYear,curMonth);
  for (let d=1; d<=total; d++) {
    const s = getDayState(d);
    if (s==="done" || s==="weekend_bonus") {
      const muscle = getDayMuscle(d);
      if (muscle && counts[muscle]!==undefined) counts[muscle]++;
    }
  }
  return counts;
}

function getLastTrainedDays(muscleId) {
  if (curMonth!==today.getMonth() || curYear!==today.getFullYear()) return null;
  const todayD = today.getDate();
  for (let d=todayD-1; d>=1; d--) {
    const s = getDayState(d);
    if ((s==="done"||s==="weekend_bonus") && getDayMuscle(d)===muscleId) return todayD-d;
  }
  return null;
}

function getMotivationalMsg(streak, weekDone) {
  if (streak===10) return "¡10 EN RACHA! 🏆🔥";
  if (streak===7)  return "¡SEMANA PERFECTA! 👑";
  if (streak===5)  return "¡5 días seguidos! 🔥🔥";
  if (streak===3)  return "¡3 en racha! 🔥";
  if (streak===1)  return "¡Empezaste la racha! 💪";
  if (weekDone===weeklyGoal) return "¡Meta semanal cumplida! 🎯";
  const misc = ["¡Bien hecho! 💪","¡Un día más! 🙌","¡A romperla! 🔥","¡Constancia! ✅","¡Eso es! 💎"];
  return misc[Math.floor(Math.random()*misc.length)];
}

/* ── Data layer ───────────────────────────────── */
async function loadMonth(y,m) {
  setSyncStatus("⏳ Cargando…");
  try {
    const data = await supa.rpc("gym_load_month", { p_year:y, p_month:m+1 });
    monthCache = {
      days:          (data && data.days)          || {},
      photo_counts:  (data && data.photo_counts)  || {},
      reward:        (data && data.reward)        || null,
      value_per_day: (data && data.value_per_day) || 0
    };
    setSyncStatus("✅ Sincronizado");
    // Autofail + penalty en background — no bloquea el render inicial
    Promise.all([
      supa.rpc("gym_autofail_past_days"),
      supa.rpc("gym_check_penalty")
    ]).then(async () => {
      const fresh = await supa.rpc("gym_load_month", { p_year:y, p_month:m+1 });
      monthCache = {
        days:          (fresh && fresh.days)          || {},
        photo_counts:  (fresh && fresh.photo_counts)  || {},
        reward:        (fresh && fresh.reward)        || null,
        value_per_day: (fresh && fresh.value_per_day) || 0
      };
      buildGrid();
    }).catch(e => console.warn("autofail bg:", e));
  } catch(e) {
    setSyncStatus("❌ Sin conexión");
    showMsg("Sin conexión — mostrando datos locales", "#ffaa22");
    console.error("loadMonth:", e);
    // No pisar el cache existente si ya había datos
    if (!monthCache.days || Object.keys(monthCache.days).length === 0) {
      monthCache = { days:{}, reward:null, value_per_day:0 };
    }
  }
}

async function setDay(y,m,d,state,muscle) {
  setSyncStatus("⏳ Guardando…");
  dbg(`setDay d=${d} state=${state} muscle=${muscle}`);
  try {
    await supa.rpc("gym_set_day", {
      p_year: y, p_month: m+1, p_day: d,
      p_state: state,
      p_muscle_group: muscle || null
    });
    const cacheState = (state==="done" && isWeekend(y,m,d)) ? "weekend_bonus" : state;
    if (state===null) {
      delete monthCache.days[String(d)];
    } else {
      monthCache.days[String(d)] = { state: cacheState, muscle_group: muscle||null };
    }
    await loadMonth(y,m);
    setSyncStatus("✅ Guardado");
    dbg(`✅ guardado d=${d} state=${state} muscle=${muscle}`);
    if (state==="done") {
      showMsg(getMotivationalMsg(calcStreak(), calcWeekDone()));
    }
  } catch(e) {
    setSyncStatus("❌ " + e.message);
    dbg("❌ setDay error: " + e.message);
    console.error("setDay:", e);
  }
}

const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x0e0e0e);

const camera   = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ── Camera control ───────────────────────────── */
const target = new THREE.Vector3(0,0,0);
let camTheta=0.35, camPhi=0.62, camRadius=24;
const PAN_LIMIT = 14;
let gridCentroid = new THREE.Vector3(0,0,0);
let targetInitialized = false;

function clampTarget() {
  target.x = Math.max(gridCentroid.x-PAN_LIMIT, Math.min(gridCentroid.x+PAN_LIMIT, target.x));
  target.z = Math.max(gridCentroid.z-PAN_LIMIT, Math.min(gridCentroid.z+PAN_LIMIT, target.z));
}
function applyCam() {
  const sT=Math.sin(camTheta), cT=Math.cos(camTheta), sP=Math.sin(camPhi), cP=Math.cos(camPhi);
  camera.position.set(target.x+camRadius*sT*sP, target.y+camRadius*cP, target.z+camRadius*cT*sP);
  camera.lookAt(target);
}
applyCam();
function doPan(dx,dy) {
  const right  = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld,0); right.y=0; right.normalize();
  const upXZ   = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld,1); upXZ.y=0; upXZ.normalize();
  const s = camRadius*0.001;
  target.addScaledVector(right,-dx*s); target.addScaledVector(upXZ,dy*s);
  clampTarget(); applyCam();
}
function doOrbit(dx,dy) {
  camTheta -= dx*0.006;
  camPhi    = Math.max(0.12, Math.min(1.35, camPhi - dy*0.006));
  applyCam();
}

/* ── Grid builder ─────────────────────────────── */
const GAP=2.0, SIZE=1.35;
let cubes=[], labelObjs=[], edgesHelper=null;
const edgesMat    = new THREE.LineBasicMaterial({ color: 0xff00cc, linewidth: 2 });
const todayEdgeMat = new THREE.LineBasicMaterial({ color: 0xffcc44, linewidth: 2 });
let todayEdge = null;
function clearEdges() { if(edgesHelper){ scene.remove(edgesHelper); edgesHelper=null; } }
function highlightCube(cube) {
  clearEdges(); if(!cube) return;
  edgesHelper = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(SIZE*1.02, SIZE*1.02, SIZE*1.02)), edgesMat);
  edgesHelper.position.copy(cube.position); scene.add(edgesHelper);
}
function makeLabel(text, opts={}) {
  const cv  = document.createElement("canvas"); cv.width=256; cv.height=128;
  const ctx = cv.getContext("2d");
  ctx.fillStyle = opts.color || "rgba(255,255,255,0.75)";
  ctx.font      = (opts.bold?"bold ":"") + (opts.size||32) + "px Arial";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(text, 128, 64);
  const mat = new THREE.SpriteMaterial({ map:new THREE.CanvasTexture(cv), transparent:true, depthWrite:false });
  const sp  = new THREE.Sprite(mat); sp.scale.set(opts.sw||2.2, opts.sh||1.1, 1);
  return sp;
}

let hitMeshes = [];
function rebuildHitMeshes() {
  hitMeshes.forEach(m => scene.remove(m)); hitMeshes=[];
  const hitGeo = new THREE.BoxGeometry(SIZE*0.72, SIZE*0.72*2, SIZE*0.72);
  for (const cube of cubes) {
    const m = new THREE.Mesh(hitGeo, new THREE.MeshBasicMaterial({ visible: false }));
    m.position.copy(cube.position); m.userData = cube.userData;
    scene.add(m); hitMeshes.push(m);
  }
}

function buildGrid() {
  cubes.forEach(c => scene.remove(c));
  labelObjs.forEach(s => scene.remove(s));
  clearEdges(); cubes=[]; labelObjs=[];

  const total    = daysInMonth(curYear,curMonth);
  const todayD   = (curMonth===today.getMonth() && curYear===today.getFullYear()) ? today.getDate() : -1;
  const firstDow = new Date(curYear,curMonth,1).getDay();
  const weeks    = Math.ceil((total+firstDow)/7);
  const offX     = -(6*GAP)/2;
  const offZ     = -(weeks-1)*GAP/2;

  gridCentroid.set(offX+3*GAP, 0, offZ+(weeks-1)*GAP/2);
  if (!targetInitialized) {
    if (curMonth===today.getMonth() && curYear===today.getFullYear()) {
      // Center between header row and today's row so both are visible
      const todayWeekRow = Math.floor((firstDow + todayD - 1) / 7);
      const headerZ = offZ - GAP*1.3;
      const todayZ  = offZ + todayWeekRow*GAP;
      target.set(offX+3*GAP, 0, (headerZ + todayZ) / 2 + GAP*0.4);
    } else {
      target.copy(gridCentroid); target.y=0;
    }
    targetInitialized=true; applyCam();
  }

  DAYS_ES.forEach((name,i) => {
    const sp = makeLabel(name, { size:65, color:"rgba(255,255,255,0.8)", bold:true, sw:3.2, sh:1.5 });
    sp.position.set(offX+i*GAP, 1.9, offZ-GAP*1.3); scene.add(sp); labelObjs.push(sp);
  });
  for (let w=0; w<weeks; w++) {
    const sp = makeLabel("S"+(w+1), { size:51, color:"rgba(255,255,255,0.5)", sw:2.2, sh:1.1 });
    sp.position.set(offX-GAP*1.5, 1.4, offZ+w*GAP); scene.add(sp); labelObjs.push(sp);
  }

  for (let d=1; d<=total; d++) {
    const dow    = (firstDow+d-1)%7;
    const week   = Math.floor((firstDow+d-1)/7);
    const wknd   = dow===0||dow===6;
    const isPast = (curYear<today.getFullYear())
                || (curYear===today.getFullYear() && curMonth<today.getMonth())
                || (curYear===today.getFullYear() && curMonth===today.getMonth() && d<todayD);
    const isToday       = d===todayD;
    const state         = getDayState(d);
    const isDone        = state==="done" || state==="weekend_bonus";
    const isWeekendBonus= state==="weekend_bonus";
    const isMiss        = state==="miss";
    const isAutofail    = isPast && !isDone && !isMiss && !wknd;
    const muscle        = getDayMuscle(d);
    const mc            = muscle ? MUSCLE_COLORS[muscle] : null;

    let color;
    if      (isDone && mc)         color = mc.cube;
    else if (isWeekendBonus)       color = 0x1166ff;
    else if (isDone)               color = 0x22aa55;
    else if (isMiss || isAutofail) color = 0xbb2222;
    else if (isToday)              color = 0xffaa22;
    else if (wknd)                 color = 0x1a1a2e;
    else                           color = 0x2a2a2a;

    const todayH = isToday ? SIZE*1.3 : SIZE;
    const geo  = new THREE.BoxGeometry(SIZE, todayH, SIZE);
    const mat  = new THREE.MeshPhongMaterial({ color, shininess: isDone?90:isToday?60:22 });
    const cube = new THREE.Mesh(geo, mat);
    cube.position.set(offX+dow*GAP, isToday ? (todayH-SIZE)/2 : 0, offZ+week*GAP);
    cube.userData = { day:d, dow, week, state, isPast, isToday, isDone, isMiss, isAutofail, wknd, isWeekendBonus };
    scene.add(cube); cubes.push(cube);

    const numSp = makeLabel(String(d), { size:28, color:"rgba(255,255,255,0.85)", sw:0.9, sh:0.55 });
    numSp.position.set(cube.position.x, SIZE*0.5+0.28, cube.position.z);
    scene.add(numSp); labelObjs.push(numSp);

    let iconOffset = 0.75;
    if (muscle && isDone) {
      const mObj = MUSCLES.find(x => x.id===muscle);
      if (mObj) {
        const mSp = makeLabel(mObj.icon, { size:32, sw:0.8, sh:0.55 });
        mSp.position.set(cube.position.x, SIZE*0.5+iconOffset, cube.position.z);
        scene.add(mSp); labelObjs.push(mSp);
        iconOffset += 0.42;
      }
    }

    if (isWeekendBonus) {
      const bSp = makeLabel("3×", { size:22, color:"rgba(130,200,255,0.95)", sw:0.62, sh:0.4 });
      bSp.position.set(cube.position.x, SIZE*0.5+iconOffset, cube.position.z);
      scene.add(bSp); labelObjs.push(bSp);
      iconOffset += 0.38;
    }

    // Badge 📷 si el día tiene fotos
    const photoCount = monthCache.photo_counts[String(d)];
    if (photoCount) {
      const pLabel = photoCount > 1 ? `📷${photoCount}` : "📷";
      const pSp = makeLabel(pLabel, { size:22, color:"rgba(255,220,120,0.95)", sw:0.75, sh:0.45 });
      pSp.position.set(cube.position.x, SIZE*0.5+iconOffset, cube.position.z);
      scene.add(pSp); labelObjs.push(pSp);
    }
  }

  // Persistent edge highlight on today's cube
  if (todayEdge) { scene.remove(todayEdge); todayEdge=null; }
  const todayCube = cubes.find(c => c.userData.isToday);
  if (todayCube) {
    const h = todayCube.geometry.parameters.height;
    todayEdge = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(SIZE*1.04, h*1.04, SIZE*1.04)),
      todayEdgeMat
    );
    todayEdge.position.copy(todayCube.position);
    scene.add(todayEdge);
  }

  rebuildHitMeshes();
  updateUI();
}

/* ── Raycaster ────────────────────────────────── */
const rc = new THREE.Raycaster();
const mv = new THREE.Vector2();
function doTap(x,y) {
  const rect = renderer.domElement.getBoundingClientRect();
  mv.x = ((x-rect.left)/rect.width)*2 - 1;
  mv.y = -((y-rect.top)/rect.height)*2 + 1;
  rc.setFromCamera(mv, camera);
  const hits = rc.intersectObjects(hitMeshes);
  if (hits.length>0) {
    const day  = hits[0].object.userData.day;
    const cube = cubes.find(c => c.userData.day===day);
    if (cube) openPopup(cube, x, y);
  } else {
    if (dayPopup.style.display==="block") closePopup();
  }
}

/* ── Popup ────────────────────────────────────── */
const dayPopup = document.getElementById("dayPopup");
dayPopup._day    = null;
dayPopup._muscle = null;

function positionPopup(sx,sy) {
  const W=window.innerWidth, H=window.innerHeight, PW=276, PH=360;
  let px=sx+18, py=sy-20;
  if (px+PW>W-8) px=sx-PW-10;
  if (px<8) px=8;
  if (py+PH>H-8) py=H-PH-8;
  if (py<8) py=8;
  dayPopup.style.left = px+"px";
  dayPopup.style.top  = py+"px";
}

function openPopup(cube, sx, sy) {
  highlightCube(cube);
  const d = cube.userData;
  dayPopup._day = d.day;

  document.getElementById("popupTitleText").textContent =
    DAYS_ES[d.dow] + " " + d.day + " de " + MONTHS[curMonth];

  let st = "";
  if      (d.isWeekendBonus) st="💙 Fin de semana 3×";
  else if (d.isDone)         st="✅ Gym hecho";
  else if (d.isMiss)         st="❌ Falla marcada";
  else if (d.isAutofail)     st="🔴 Día pasado sin registrar";
  else if (d.isToday)        st="🟡 Hoy";
  else if (d.wknd)           st="🏖 Fin de semana (3× si vas)";
  else                       st="⬜ Día futuro";
  document.getElementById("popupStatus").textContent = st;

  const canEdit = !d.isAutofail;
  document.getElementById("btnDone").style.display  = canEdit             ? "block" : "none";
  document.getElementById("btnMiss").style.display  = (canEdit&&!d.wknd) ? "block" : "none";
  document.getElementById("btnReset").style.display = (canEdit&&d.state)  ? "block" : "none";
  document.getElementById("muscleRow").style.display = canEdit ? "block" : "none";

  if (canEdit) {
    clearMuscleSelection();
    const existing = getDayMuscle(d.day);
    if (existing) {
      const mc  = MUSCLE_COLORS[existing];
      const btn = document.querySelector(`.muscle-btn[data-id="${existing}"]`);
      if (btn && mc) {
        btn.classList.add("selected");
        btn.style.background  = mc.css + "22";
        btn.style.borderColor = mc.css + "99";
        btn.style.color       = mc.css;
        dayPopup._muscle = existing;
        const tag = document.getElementById("selectedMuscleTag");
        tag.textContent = MUSCLES.find(x=>x.id===existing)?.icon || "";
        tag.style.background = mc.css + "33";
        tag.style.color = mc.css;
        tag.style.display = "inline";
        const ago = getLastTrainedDays(existing);
        document.getElementById("muscleHint").textContent =
          ago===null ? "" : ago===1 ? "Último: ayer" : `Último: hace ${ago} días`;
      }
    }
    dbg(`popup d=${d.day} muscle=${dayPopup._muscle}`);
  }

  positionPopup(sx, sy);
  dayPopup.style.display = "block";

  // Cargar fotos del día en background
  dayPhotos = [];
  renderPhotoGrid();
  loadDayPhotos(curYear, curMonth+1, d.day).then(photos => {
    dayPhotos = photos;
    renderPhotoGrid();
  });
}

function closePopup() {
  dayPopup.style.display = "none";
  dayPopup._day = null;
  clearMuscleSelection();
  clearEdges();
}

async function applyState(state) {
  const day    = dayPopup._day; if (day===null) return;
  const muscle = (state==="done") ? (dayPopup._muscle || null) : null;
  dbg(`applyState day=${day} state=${state} muscle=${muscle}`);
  closePopup();
  await setDay(curYear, curMonth, day, state, muscle);
  buildGrid();
}

    card.querySelector("h2").textContent = "Nueva recompensa";
    card.querySelector("p").textContent  =
      r.name + " activa ($" + Math.round(r.current_amount) + " de $" + Math.round(r.target_amount) + "). Al guardar una nueva, se cierra la actual.";
  } else {
    card.querySelector("h2").textContent = "Nueva recompensa";
    card.querySelector("p").textContent  = "Si no la cumplís en 30 días, se penaliza un 25%. Los fines de semana cuentan 3×.";
  }
  document.getElementById("modalRewardName").value = "";
  document.getElementById("modalRewardCost").value = "";
  rewardModal.classList.add("open");
});
document.getElementById("btnCancelReward").addEventListener("click", () => rewardModal.classList.remove("open"));
document.getElementById("btnSaveReward").addEventListener("click", async () => {
  const name = document.getElementById("modalRewardName").value.trim();
  const cost = Number(document.getElementById("modalRewardCost").value || 0);
  if (!name || !cost) { showMsg("Completá nombre y valor","#ff6b6b"); return; }
  const hasActive = monthCache.reward !== null;
  if (hasActive) {
    const r   = monthCache.reward;
    const pct = r.target_amount>0 ? Math.round(r.current_amount/r.target_amount*100) : 0;
    const ok  = confirm(`¿Completaste "${r.name}"?\n\nAcumulado: $${Math.round(r.current_amount)} de $${Math.round(r.target_amount)} (${pct}%)\n\nAl confirmar se cierra y arranca la nueva.`);
    if (!ok) return;
  }
  rewardModal.classList.remove("open");
  setSyncStatus("⏳ Guardando recompensa…");
  try {
    if (hasActive) {
      await supa.rpc("gym_complete_reward", { p_name:name, p_amount:cost });
    } else {
      await supa.insert("gym_reward", { name, target_amount: cost });
    }
    await loadMonth(curYear, curMonth);
    buildGrid();
    showMsg("✓ Recompensa guardada");
  } catch(e) { setSyncStatus("❌ " + e.message); }
});

monthSel.onchange = () => { curMonth=Number(monthSel.value); targetInitialized=false; init(); };
yearSel.onchange  = () => { curYear=Number(yearSel.value);   targetInitialized=false; init(); };

/* ── Mode tag ─────────────────────────────────── */
const modeTag = document.getElementById("modeTag");
function showMode(o) {
  modeTag.textContent = o ? "🔄 Órbita activa" : "✋ Paneo";
  modeTag.style.color = o ? "rgba(255,220,80,0.85)" : "rgba(255,255,255,0.22)";
}

/* ── Touch events ─────────────────────────────── */
let isDragging=false, isPinching=false;
let lastX=0, lastY=0, downX=0, downY=0, downTime=0, lastPinchDist=0;
let orbitHeld=false, lastTapTime=0, lastTapX=0, lastTapY=0;

renderer.domElement.addEventListener("touchstart", e => {
  e.preventDefault();
  if (e.touches.length===1) {
    const t=e.touches[0]; isDragging=true; isPinching=false;
    lastX=t.clientX; lastY=t.clientY; downX=t.clientX; downY=t.clientY; downTime=Date.now();
    const dt=downTime-lastTapTime, dd=Math.hypot(downX-lastTapX, downY-lastTapY);
    orbitHeld=(dt<280&&dd<45); if(orbitHeld) showMode(true);
  } else if (e.touches.length===2) {
    isDragging=false; isPinching=true;
    lastPinchDist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
  }
}, { passive: false });

renderer.domElement.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length===1 && isDragging) {
    const t=e.touches[0], dx=t.clientX-lastX, dy=t.clientY-lastY;
    if (orbitHeld) doOrbit(dx,dy); else doPan(dx,dy);
    lastX=t.clientX; lastY=t.clientY;
  } else if (e.touches.length===2 && isPinching) {
    const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
    camRadius=Math.max(8, Math.min(55, camRadius*(lastPinchDist/d)));
    lastPinchDist=d; applyCam();
  }
}, { passive: false });

renderer.domElement.addEventListener("touchend", e => {
  if (orbitHeld && e.touches.length===0) { orbitHeld=false; showMode(false); }
  if (isDragging && e.touches.length===0) {
    const moved = Math.abs(downX-lastX)>8 || Math.abs(downY-lastY)>8;
    if (!moved && Date.now()-downTime<350) {
      doTap(downX, downY);
      lastTapTime=Date.now(); lastTapX=downX; lastTapY=downY;
    }
  }
  if (e.touches.length===0) { isDragging=false; isPinching=false; }
  else if (e.touches.length===1) { isPinching=false; isDragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
}, { passive: false });

/* ── Mouse events ─────────────────────────────── */
let mDown=false, mPrevX=0, mPrevY=0, mDownX=0, mDownY=0, mDownTime=0;
renderer.domElement.addEventListener("mousedown", e => { mDown=true; mPrevX=e.clientX; mPrevY=e.clientY; mDownX=e.clientX; mDownY=e.clientY; mDownTime=Date.now(); });
window.addEventListener("mouseup", e => {
  if (mDown) {
    const moved = Math.abs(e.clientX-mDownX)>4 || Math.abs(e.clientY-mDownY)>4;
    if (!moved && Date.now()-mDownTime<400) doTap(e.clientX, e.clientY);
  }
  mDown=false;
});
window.addEventListener("mousemove", e => {
  if (!mDown) return;
  const dx=e.clientX-mPrevX, dy=e.clientY-mPrevY;
  if (e.buttons===2 || e.altKey) doOrbit(dx,dy); else doPan(dx,dy);
  mPrevX=e.clientX; mPrevY=e.clientY;
});
renderer.domElement.addEventListener("contextmenu", e => e.preventDefault());
renderer.domElement.addEventListener("wheel", e => {
  e.preventDefault();
  camRadius=Math.max(8, Math.min(55, camRadius*(e.deltaY>0?1.08:0.93)));
  applyCam();
}, { passive: false });

/* ── Sistema de fotos ─────────────────────────── */
let dayPhotos = [];      // fotos del día abierto en popup
let galleryIndex = 0;

function getPhotoPublicUrl(path) {
  return `${SUPA_URL}/storage/v1/object/public/gym-photos/${path}`;
}

async function loadDayPhotos(year, month, day) {
  try {
    const res = await fetchWithTimeout(
      `${SUPA_URL}/rest/v1/gym_photos?year=eq.${year}&month=eq.${month}&day=eq.${day}&order=created_at.asc`,
      { headers: { "apikey": SUPA_KEY, "Authorization": "Bearer "+SUPA_KEY } }
    );
    const data = await res.json();
    return Array.isArray(data) ? data : [];
  } catch(e) { console.warn("loadDayPhotos:", e); return []; }
}

async function uploadPhoto(file, year, month, day) {
  const ext  = (file.name || "photo").split(".").pop().replace(/[^a-z0-9]/gi,"") || "jpg";
  const path = `${year}/${month}/${day}/${Date.now()}.${ext}`;
  // 1. subir al storage
  const upRes = await fetchWithTimeout(
    `${SUPA_URL}/storage/v1/object/gym-photos/${path}`,
    { method:"POST",
      headers: { "apikey":SUPA_KEY, "Authorization":"Bearer "+SUPA_KEY,
                 "Content-Type": file.type || "image/jpeg" },
      body: file },
    60000
  );
  if (!upRes.ok) { const t=await upRes.text(); throw new Error("Storage: "+t); }
  // 2. guardar referencia en DB
  await supa.rpc("gym_save_photo", { p_year:year, p_month:month, p_day:day, p_path:path });
  return path;
}

async function handlePhotoInput(e) {
  const file = e.target.files[0];
  if (!file || !dayPopup._day) return;
  e.target.value = "";  // reset input para permitir reseleccionar

  // Mostrar spinner de carga
  const spinner = document.createElement("div");
  spinner.className = "photo-uploading"; spinner.textContent = "⏳";
  const grid = document.getElementById("photoGrid");
  const label = document.getElementById("photoAddLabel");
  grid.insertBefore(spinner, label);

  try {
    setSyncStatus("⏳ Subiendo foto…");
    const path = await uploadPhoto(file, curYear, curMonth+1, dayPopup._day);
    setSyncStatus("✅ Foto guardada");
    // Actualizar cache de contadores
    const dk = String(dayPopup._day);
    monthCache.photo_counts[dk] = (monthCache.photo_counts[dk] || 0) + 1;
    // Reload fotos del día
    dayPhotos = await loadDayPhotos(curYear, curMonth+1, dayPopup._day);
    renderPhotoGrid();
    buildGrid();   // actualiza badge 📷 en el cubo
    showMsg("📸 Foto guardada", "#ffcc44");
  } catch(err) {
    setSyncStatus("❌ "+err.message);
    showMsg("Error al subir foto", "#ff6b6b");
    console.error("uploadPhoto:", err);
  } finally {
    spinner.remove();
  }
}

function renderPhotoGrid() {
  const grid  = document.getElementById("photoGrid");
  const label = document.getElementById("photoAddLabel");
  // Eliminar miniaturas anteriores (mantener el label)
  Array.from(grid.children).forEach(c => { if(c !== label) c.remove(); });
  dayPhotos.forEach((photo, idx) => {
    const img = document.createElement("img");
    img.className   = "photo-thumb";
    img.src         = getPhotoPublicUrl(photo.storage_path);
    img.loading     = "lazy";
    img.alt         = `Foto ${idx+1}`;
    img.addEventListener("click", () => openGallery(idx));
    img.addEventListener("touchstart", e => { e.stopPropagation(); }, { passive:true });
    grid.insertBefore(img, label);
  });
}

function openGallery(startIndex) {
  galleryIndex = startIndex;
  document.getElementById("galleryModal").classList.add("open");
  showGalleryPhoto();
}

function showGalleryPhoto() {
  const photo = dayPhotos[galleryIndex];
  if (!photo) return;
  const img = document.getElementById("galleryImg");
  const spin = document.getElementById("gallerySpinner");
  img.style.display  = "none";
  spin.style.display = "block";
  img.onload = () => { spin.style.display="none"; img.style.display="block"; };
  img.src = getPhotoPublicUrl(photo.storage_path);
  document.getElementById("galleryCounter").textContent = `${galleryIndex+1}/${dayPhotos.length}`;
  document.getElementById("galleryCaption").textContent = photo.caption || "";
  document.getElementById("galleryPrev").disabled = galleryIndex === 0;
  document.getElementById("galleryNext").disabled = galleryIndex === dayPhotos.length-1;
}

async function deleteCurrentPhoto() {
  const photo = dayPhotos[galleryIndex];
  if (!photo) return;
  if (!confirm("¿Borrar esta foto?")) return;
  try {
    // Borrar de DB y obtener el path para borrar del storage
    const path = await supa.rpc("gym_delete_photo", { p_id: photo.id });
    // Borrar del storage
    await fetchWithTimeout(`${SUPA_URL}/storage/v1/object/gym-photos/${path}`,
      { method:"DELETE", headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY} });
    // Actualizar cache
    const dk = String(dayPopup._day);
    monthCache.photo_counts[dk] = Math.max(0, (monthCache.photo_counts[dk]||1)-1);
    if (!monthCache.photo_counts[dk]) delete monthCache.photo_counts[dk];
    dayPhotos.splice(galleryIndex, 1);
    if (dayPhotos.length === 0) {
      document.getElementById("galleryModal").classList.remove("open");
      renderPhotoGrid();
      buildGrid();
      showMsg("Foto borrada");
      return;
    }
    galleryIndex = Math.min(galleryIndex, dayPhotos.length-1);
    renderPhotoGrid();
    buildGrid();
    showGalleryPhoto();
    showMsg("Foto borrada");
  } catch(e) { showMsg("Error al borrar", "#ff6b6b"); console.error(e); }
}

// Event listeners de galería
document.getElementById("galleryClose").addEventListener("click", () => document.getElementById("galleryModal").classList.remove("open"));
document.getElementById("galleryPrev").addEventListener("click", () => { if(galleryIndex>0){ galleryIndex--; showGalleryPhoto(); }});
document.getElementById("galleryNext").addEventListener("click", () => { if(galleryIndex<dayPhotos.length-1){ galleryIndex++; showGalleryPhoto(); }});
document.getElementById("galleryDel").addEventListener("click", deleteCurrentPhoto);
// Swipe en galería (móvil)
let _galSwipeX = 0;
document.getElementById("galleryModal").addEventListener("touchstart", e => { _galSwipeX = e.touches[0].clientX; }, {passive:true});
document.getElementById("galleryModal").addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - _galSwipeX;
  if (Math.abs(dx) < 40) return;
  if (dx < 0 && galleryIndex < dayPhotos.length-1) { galleryIndex++; showGalleryPhoto(); }
  if (dx > 0 && galleryIndex > 0) { galleryIndex--; showGalleryPhoto(); }
}, {passive:true});

// Input de foto
document.getElementById("photoInput").addEventListener("change", handlePhotoInput);

/* ── Close popup on outside click ────────────── */
document.addEventListener("click", e => {
  if (dayPopup.style.display !== "block") return;
  if (dayPopup.contains(e.target)) return;
  if (e.target === renderer.domElement) return; // handled by doTap
  closePopup();
});

/* ── Render loop ──────────────────────────────── */
function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
animate();
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ── Boot ─────────────────────────────────────── */
async function init() {
  buildMuscleGrid();
  await loadMonth(curYear, curMonth);
  buildGrid();
}
init();
</script>
